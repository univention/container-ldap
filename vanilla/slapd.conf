# Minimal vanilla slapd.conf
# No Univention-specific schemas, overlays, or modules.

# Standard schemas
include   /etc/ldap/schema/core.schema
include   /etc/ldap/schema/cosine.schema
include   /etc/ldap/schema/inetorgperson.schema
include   /etc/ldap/schema/nis.schema

# Load MDB backend module
modulepath /usr/lib/ldap
moduleload back_mdb

# MDB backend
database  mdb
suffix    "dc=example,dc=org"
rootdn    "cn=admin,dc=example,dc=org"
include   /etc/ldap/rootpw.conf

directory /var/lib/ldap

# Indices
index     objectClass eq

# Simple ACL: admin gets full access, everyone else can read
access to *
    by dn.exact="cn=admin,dc=example,dc=org" write
    by * read
