---
# Vanilla slapd using the Univention ldap-server container image,
# bypassing all Univention-specific entrypoint logic.

services:
  ldap:
    image: artifacts.software-univention.de/nubus/images/ldap-server:0.47.13
    init: true
    user: "100:102"
    entrypoint: ["/entrypoint.sh"]
    environment:
      LDAP_ADMIN_PW: admin
      LDAP_LOG_LEVEL: stats
    ports:
      - "389:389"
    volumes:
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./slapd.conf:/etc/ldap/slapd.conf:ro
      - ./seed.ldif:/seed/seed.ldif:ro
      - ./data:/var/lib/ldap

  ldap-admin:
    image: osixia/phpldapadmin:0.9.0
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8080:80"
    depends_on:
      - ldap
